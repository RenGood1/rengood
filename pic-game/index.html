<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Picture Reveal - 10 Rounds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-container {
            aspect-ratio: 16 / 9;
            perspective: 1000px;
            touch-action: manipulation;
        }
        
        .tile {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            backface-visibility: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .tile.revealed {
            transform: rotateY(180px);
            opacity: 0;
            pointer-events: none;
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        #mystery-image {
            background-size: cover;
            background-position: center;
        }

        .progress-dot {
            transition: all 0.3s ease;
        }
        
        .progress-dot.active {
            background-color: #ff0006;
            box-shadow: 0 0 10px #ff0006;
            transform: scale(1.1);
        }

        .progress-dot.completed {
            background-color: #22c55e;
        }

        /* Prevent zooming on input focus in iOS */
        @media screen and (max-width: 768px) {
            input[type="text"] {
                font-size: 16px !important;
            }
        }
    </style>
</head>
<body class="bg-[#630c0e] text-white min-h-screen flex flex-col items-center p-2 md:p-4 font-sans overflow-x-hidden">

    <!-- Header & Round Progress -->
    <header class="text-center mb-4 md:mb-6 mt-2 w-full max-w-4xl">
        <h1 class="text-2xl md:text-4xl font-black tracking-tight text-[#fff] mb-2 md:mb-4 uppercase italic">Picture Reveal</h1>

        
        <div class="flex justify-between items-center mb-2 px-2">
            <span class="text-[10px] md:text-xs font-bold uppercase text-gray-300">Game Progress</span>
            <span class="text-[10px] md:text-xs font-bold uppercase text-gray-300" id="marathon-text">Round 1 / 10</span>
        </div>
        <div class="flex gap-1 md:gap-2 h-1.5 md:h-2 w-full bg-[#1E1F22] rounded-full overflow-hidden p-0.5" id="progress-bar">
            <!-- Progress dots generated by JS -->
        </div>
    </header>

    <!-- Main Game Area -->
    <main class="w-full max-w-4xl bg-[#2B2D31] rounded-xl md:rounded-2xl p-3 md:p-6 shadow-2xl border border-[#1E1F22]">
        
        <!-- Stats & Controls -->
        <div class="flex flex-col sm:flex-row justify-between items-center mb-4 gap-4">
            <div class="flex gap-2 w-full sm:w-auto">
                <div class="bg-[#1E1F22] px-4 py-2 rounded-lg border border-[#35373C] flex-1 sm:flex-none flex flex-col items-center sm:items-start">
                    <span class="text-gray-500 text-[10px] uppercase font-bold block leading-none mb-1">Reveals Used</span>
                    <div class="flex items-center gap-2">
                        <div class="text-lg md:text-xl font-mono font-bold" id="reveal-counter">0 / 10</div>
                        <span id="reveal-limit-msg" class="hidden text-[10px] text-red-500 font-bold uppercase animate-pulse">Board Locked</span>
                    </div>
                </div>

                <div class="bg-[#1E1F22] px-4 py-2 rounded-lg border border-[#35373C] flex-1 sm:flex-none flex flex-col items-center sm:items-start">
                    <span class="text-gray-500 text-[10px] uppercase font-bold block leading-none mb-1">Timer</span>
                    <div class="text-lg md:text-xl font-mono font-bold text-[#5865F2]" id="timer-display">00:00</div>
                </div>
            </div>

            <!-- Guess Controls -->
            <div id="controls-guess" class="flex gap-2 w-full sm:w-auto">
                <input type="text" id="guess-input" placeholder="Your guess..." 
                    class="flex-1 sm:flex-none bg-[#1E1F22] border border-[#35373C] rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#5865F2] sm:w-48 md:w-64 transition-all">
                <button onclick="checkGuess()" 
                    class="bg-[#5865F2] hover:bg-[#4752C4] px-4 md:px-6 py-2 rounded-lg font-bold transition-colors active:scale-95 uppercase tracking-widest text-xs md:text-sm">
                    GUESS
                </button>
            </div>

            <!-- Win Controls (Hidden by default) -->
            <div id="controls-next" class="hidden flex items-center justify-between sm:justify-end gap-4 w-full sm:w-auto bg-[#1E1F22] sm:bg-transparent p-2 sm:p-0 rounded-lg">
                <div class="flex flex-col items-end">
                    <span class="text-green-500 font-black italic animate-pulse text-sm md:text-base leading-none">CORRECT!</span>
                    <span id="round-time-result" class="text-[10px] text-gray-400 font-bold uppercase mt-1">Time: 00:00</span>
                </div>
                <button onclick="nextRound()" 
                    class="bg-green-600 hover:bg-green-500 px-6 md:px-8 py-2 rounded-lg font-bold transition-colors active:scale-95 uppercase tracking-widest text-xs md:text-sm shadow-lg shadow-green-900/20">
                    Next Image →
                </button>
            </div>
        </div>

        <!-- The Board -->
        <div id="game-board" class="relative grid-container w-full rounded-lg md:rounded-xl overflow-hidden border-2 md:border-4 border-[#1E1F22] bg-black shadow-inner">
            <!-- The Secret Image -->
            <div id="mystery-image" class="absolute inset-0 w-full h-full"></div>
            
            <!-- The Grid Overlay -->
            <div id="grid-overlay" class="absolute inset-0 grid grid-cols-6 grid-rows-4 gap-0 md:gap-0 p-0 md:p-0">
                <!-- Tiles generated by JS -->
            </div>

            <!-- Overlays -->
            <!-- Grand Win Overlay -->
            <div id="grand-win-screen" class="hidden absolute inset-0 z-50 flex flex-col items-center justify-center bg-[#5865F2]/60 backdrop-blur-md p-4">
                <div class="bg-[#1E1F22] p-6 md:p-12 rounded-2xl md:rounded-3xl shadow-[0_0_50px_rgba(88,101,242,0.5)] border-4 md:border-8 border-[#5865F2] text-center w-full max-w-sm md:max-w-none">
                    <div class="text-4xl md:text-6xl mb-2 md:mb-4">🏆</div>
                    <h2 class="text-3xl md:text-6xl font-black text-white mb-2 italic uppercase">BIG WEINER!</h2>
                    <p class="text-sm md:text-2xl mb-2 text-gray-300 uppercase font-bold tracking-widest">You won all rounds!</p>
                    <div class="bg-black/30 rounded-xl p-4 mb-8 border border-white/10">
                        <span class="text-gray-400 text-xs uppercase font-bold block mb-1">Total Game Time</span>
                        <span id="final-total-time" class="text-3xl md:text-5xl font-mono font-black text-[#5865F2]">00:00</span>
                    </div>
                    <button onclick="resetMarathon()" class="w-full sm:w-auto bg-[#5865F2] text-white px-8 md:px-12 py-3 md:py-4 rounded-xl md:rounded-2xl font-black text-base md:text-xl hover:bg-[#4752C4] transition-all uppercase shadow-lg">New Game</button>
                </div>
            </div>

            <!-- Skip Round Button (Visible when stuck) -->
            <div id="skip-container" class="hidden absolute bottom-4 left-0 right-0 z-40 flex justify-center">
                <button onclick="nextRound()" class="bg-red-500/80 hover:bg-red-600 text-white px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest backdrop-blur-sm transition-all border border-red-400">
                    Stuck? Skip Round
                </button>
            </div>
        </div>

        <!-- Host Controls -->
        <details class="mt-4 md:mt-8 group" style="display:none;">
            <summary class="cursor-pointer text-gray-500 text-[10px] md:text-xs hover:text-gray-300 transition-colors list-none flex items-center gap-2 font-bold uppercase tracking-widest opacity-50 hover:opacity-100">
                <span class="group-open:rotate-90 transition-transform">▶</span>  Settings (10 Rounds)Host
            </summary>
            <div class="mt-4 p-4 bg-[#1E1F22] rounded-xl border border-[#35373C] space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Image URLs (One per line)</label>
                        <textarea id="host-urls" rows="5" class="w-full bg-[#2B2D31] border border-[#35373C] rounded p-2 text-[10px] text-gray-300 font-mono focus:ring-1 focus:ring-[#5865F2] outline-none" placeholder="https://image1.jpg..."></textarea>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Answers (One per line)</label>
                        <textarea id="host-answers" rows="5" class="w-full bg-[#2B2D31] border border-[#35373C] rounded p-2 text-[10px] text-gray-300 font-mono focus:ring-1 focus:ring-[#5865F2] outline-none" placeholder="Monkey..."></textarea>
                    </div>
                </div>
                <button onclick="setupMarathon()" class="w-full bg-[#5865F2] hover:bg-[#4752C4] py-3 rounded-lg font-black transition-all text-xs uppercase tracking-widest">Apply Marathon Settings</button>
            </div>
        </details>
    </main>

    <script>
        const defaultImages = [
            "img/beetles-funeral.png",
            "img/dancing-bull-ballet.png",
            "img/justice-fish.png",
            "img/potter-domino-dog.png",
            "img/raccoon-chef.png",
            "img/rat-kiss.png",
            "img/trash-duck.png",
            "img/worm-party.png",
            "img/zebra-mime.png",
            "img/sherlock-giraffe.png"
        ];
        
        const defaultAnswers = ["beetle beetles barnaby rip funeral coffin", "bull bulls cow cows ballet dancing", "justice league fish fishes superheroes super heroes aquatic aquaman powers powered superpowers", "Dog potter harry domino hogwarts cocker spaniel", "Raccoon chef cook coon ramsay gordon fancy", "rat mouse kiss band metal rock ren", "bin duck mallard trash garbage garbageman garbagetruck waste Trashman collector", "worm worms earthworm earthworms party celebration prom gay fiesta", "zebra zebras mime mimes fight battle mimeoff mimic mimicry", "sherlock giraffe british detective pipe melman"];

        let marathon = {
            rounds: [],
            currentRoundIndex: 0,
            revealsUsed: 0,
            maxReveals: 10,
            isGameOver: false,
            totalMarathonTime: 0,
            roundStartTime: null,
            timerInterval: null
        };

        const elements = {
            board: document.getElementById('grid-overlay'),
            img: document.getElementById('mystery-image'),
            counter: document.getElementById('reveal-counter'),
            guess: document.getElementById('guess-input'),
            grandWin: document.getElementById('grand-win-screen'),
            progressBar: document.getElementById('progress-bar'),
            marathonText: document.getElementById('marathon-text'),
            controlsGuess: document.getElementById('controls-guess'),
            controlsNext: document.getElementById('controls-next'),
            limitMsg: document.getElementById('reveal-limit-msg'),
            skipContainer: document.getElementById('skip-container'),
            timer: document.getElementById('timer-display'),
            roundTimeResult: document.getElementById('round-time-result'),
            finalTotalTime: document.getElementById('final-total-time')
        };

        function setupMarathon() {
            const urls = document.getElementById('host-urls').value.split('\n').filter(l => l.trim() !== '');
            const answers = document.getElementById('host-answers').value.split('\n').filter(l => l.trim() !== '');

            const useUrls = urls.length > 0 ? urls : defaultImages;
            const useAnswers = answers.length > 0 ? answers : defaultAnswers;

            marathon.rounds = [];
            for(let i=0; i < 10; i++) {
                marathon.rounds.push({
                    img: useUrls[i % useUrls.length],
                    ans: useAnswers[i % useAnswers.length]
                });
            }

            marathon.currentRoundIndex = 0;
            marathon.totalMarathonTime = 0;
            updateProgressBar();
            initRound();
        }

        function initRound() {
            const currentRound = marathon.rounds[marathon.currentRoundIndex];
            marathon.revealsUsed = 0;
            marathon.isGameOver = false;
            marathon.roundStartTime = null;
            clearInterval(marathon.timerInterval);
            
            elements.timer.innerText = "00:00";
            elements.counter.innerText = `0 / ${marathon.maxReveals}`;
            elements.img.style.backgroundImage = `url('${currentRound.img}')`;
            elements.marathonText.innerText = `Round ${marathon.currentRoundIndex + 1} / 10`;
            
            elements.grandWin.classList.add('hidden');
            elements.limitMsg.classList.add('hidden');
            elements.skipContainer.classList.add('hidden');
            elements.controlsGuess.classList.remove('hidden');
            elements.controlsNext.classList.add('hidden');
            elements.guess.value = '';
            
            elements.board.innerHTML = '';
            for (let i = 1; i <= 24; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile bg-[#23272A] border border-[#2B2D31] flex items-center justify-center font-black text-gray-600 text-sm md:text-xl cursor-pointer hover:bg-[#2C2F33] hover:text-[#5865F2] select-none';
                tile.innerText = i;
                tile.onclick = () => revealTile(tile);
                elements.board.appendChild(tile);
            }
            updateProgressBar();
        }

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            marathon.roundStartTime = Date.now();
            marathon.timerInterval = setInterval(() => {
                const elapsed = Date.now() - marathon.roundStartTime;
                elements.timer.innerText = formatTime(elapsed);
            }, 1000);
        }

        function revealTile(element) {
            if (marathon.isGameOver || marathon.revealsUsed >= marathon.maxReveals || element.classList.contains('revealed')) return;

            // Start timer on first reveal
            if (marathon.revealsUsed === 0) {
                startTimer();
            }

            element.classList.add('revealed');
            marathon.revealsUsed++;
            elements.counter.innerText = `${marathon.revealsUsed} / ${marathon.maxReveals}`;

            if (marathon.revealsUsed >= marathon.maxReveals) {
                elements.limitMsg.classList.remove('hidden');
                elements.skipContainer.classList.remove('hidden');
            }
        }

        function checkGuess() {
            if (marathon.isGameOver) return;
            const userGuess = elements.guess.value.trim().toLowerCase();
            const correctAnsStr = marathon.rounds[marathon.currentRoundIndex].ans.trim().toLowerCase();

            const keywords = correctAnsStr.split(/\s+/).filter(word => word.length > 2);
            const requiredMatches = Math.min(keywords.length, 2);
            
            let matchCount = 0;
            keywords.forEach(word => {
                if (userGuess.includes(word)) matchCount++;
            });

            if (userGuess !== "" && (matchCount >= requiredMatches && requiredMatches > 0)) {
                winRound();
            } else if (userGuess !== "" && userGuess.includes(correctAnsStr)) {
                winRound();
            } else {
                handleWrongGuess();
            }
        }

        function winRound() {
            marathon.isGameOver = true;
            clearInterval(marathon.timerInterval);
            
            const roundTimeMs = marathon.roundStartTime ? Date.now() - marathon.roundStartTime : 0;
            marathon.totalMarathonTime += roundTimeMs;

            elements.limitMsg.classList.add('hidden');
            elements.skipContainer.classList.add('hidden');
            document.querySelectorAll('.tile').forEach(t => t.classList.add('revealed'));
            
            if (marathon.currentRoundIndex === 9) {
                elements.finalTotalTime.innerText = formatTime(marathon.totalMarathonTime);
                setTimeout(() => {
                    elements.grandWin.classList.remove('hidden');
                }, 1500);
            } else {
                elements.roundTimeResult.innerText = `Time: ${formatTime(roundTimeMs)}`;
                elements.controlsGuess.classList.add('hidden');
                elements.controlsNext.classList.remove('hidden');
            }
        }

        function nextRound() {
            marathon.currentRoundIndex++;
            if (marathon.currentRoundIndex < 10) {
                initRound();
            }
        }

        function handleWrongGuess() {
            const container = document.querySelector('main');
            container.classList.add('shake');
            elements.guess.classList.add('border-red-500');
            setTimeout(() => {
                container.classList.remove('shake');
                elements.guess.classList.remove('border-red-500');
            }, 500);
            elements.guess.value = '';
        }

        function updateProgressBar() {
            elements.progressBar.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const dot = document.createElement('div');
                dot.className = 'flex-1 rounded-full progress-dot ';
                if (i < marathon.currentRoundIndex) {
                    dot.classList.add('completed');
                } else if (i === marathon.currentRoundIndex) {
                    dot.classList.add('active');
                } else {
                    dot.className += 'bg-[#2B2D31]';
                }
                elements.progressBar.appendChild(dot);
            }
        }

        function resetMarathon() {
            marathon.currentRoundIndex = 0;
            marathon.totalMarathonTime = 0;
            initRound();
        }

        elements.guess.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkGuess(); });

        document.getElementById('host-urls').value = defaultImages.join('\n');
        document.getElementById('host-answers').value = defaultAnswers.join('\n');
        setupMarathon();
    </script>
</body>
</html>
