<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Help Hunt</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        h1 {
            margin-bottom: 5px;
            color: #222;
        }

        /* Container scales and locks the aspect ratio of your image (16:9 format) */
        #game-wrapper {
            position: relative;
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16 / 9; 
            border: 4px solid #1a1a1a;
            border-radius: 8px;
            box-shadow: 0 12px 36px rgba(0,0,0,0.18);
            overflow: hidden;
            background-color: #fff;
        }

        /* The actual high-quality generated illustration */
        #background-img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: fill;
        }

        /* Interactive Click Targets for the T-Rexes */
        .cat-target {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            background-color: rgba(0, 0, 0, 0); /* Completely hidden at start */
            transition: background-color 0.25s ease, border 0.25s ease;
            z-index: 10;
        }

        /* When clicked, it applies a crisp translucent blue tint over the catsaur line-art */
        .cat-target.found {
            background-color: rgba(52, 152, 219, 0.45); 
            border: 2px solid #2980b9;
            pointer-events: none; /* Deactivates further clicks */
        }

        /* Hint Pulse Ring */
        .hint-ring {
            position: absolute;
            border: 3px dashed #ff4757;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            transform: translate(-50%, -50%);
            z-index: 5;
        }

        @keyframes pulse {
            0% { width: 10px; height: 10px; opacity: 1; }
            100% { width: 90px; height: 90px; opacity: 0; }
        }

        .pulse-active {
            animation: pulse 1.2s ease-out 2;
        }

        /* UI Panel */
        #ui-panel {
            margin-top: 20px;
            display: flex;
            gap: 25px;
            align-items: center;
            background: white;
            padding: 12px 30px;
            border: 3px solid #1a1a1a;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
        }

        #hint-btn {
            background: #1a1a1a;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        #hint-btn:hover {
            background: #444;
        }
        /* Change background-color from rgba(0, 0, 0, 0) to this: */


    </style>
</head>

<body>

    <h1>Take Help: Find all the Helps and take them.</h1>
    <p>Find the 20 hidden Helps embedded in Georgia!</p>

    <div id="game-wrapper">
        <img id="background-img" src="HelpFind.png" alt="Georgia Hidden Help Map">

        <div class="cat-target" id="cat-1" style="top: 10%; left: 30.4%; width: 3.0%; height: 5.5%;"></div>
        <div class="cat-target" id="cat-2" style="top: 19%; left: 51.5%; width: 3.0%; height: 5.5%;"></div>
        <div class="cat-target" id="cat-3" style="top: 19.3%; left: 65.5%; width: 3.0%; height: 5.5%;"></div>
        <div class="cat-target" id="cat-4" style="top: 34.2%; left: 48%; width: 3.0%; height: 5.5%;"></div>
        <div class="cat-target" id="cat-5" style="top: 33.2%; left: 20.1%; width: 3.0%; height: 5.5%;"></div>
        <div class="cat-target" id="cat-6" style="top: 35.3%; left: 2.6%; width: 3.0%; height: 5.5%;"></div>
        <div class="cat-target" id="cat-7" style="top: 63.0%; left: 10%; width: 6%; height: 9%;"></div>
        <div class="cat-target" id="cat-8" style="top: 53.2%; left: 29.0%; width: 3.0%; height: 5.5%;"></div>
        <div class="cat-target" id="cat-9" style="top: 79.7%; left: 28.9%; width: 3.0%; height: 5.5%;"></div>
        <div class="cat-target" id="cat-10" style="top: 86.2%; left: 57.6%; width: 3.0%; height: 5.5%;"></div>
        <div class="cat-target" id="cat-11" style="top: 55.6%; left: 60.9%; width: 5.0%; height: 7.5%;"></div>
        <div class="cat-target" id="cat-12" style="top: 73.5%; left: 87.5%; width: 3.0%; height: 5.5%;"></div>
        <div class="cat-target" id="cat-13" style="top: 53.8%; left: 94.6%; width: 3.0%; height: 5.5%;"></div>
        <div class="cat-target" id="cat-14" style="top: 47.7%; left: 76.2%; width: 3.0%; height: 5.5%;"></div>
        <div class="cat-target" id="cat-15" style="top: 43.8%; left: 82.1%; width: 3.0%; height: 5.5%;"></div>
        <div class="cat-target" id="cat-16" style="top: 27.2%; left: 80.2%; width: 3.0%; height: 5.5%;"></div>
        <div class="cat-target" id="cat-17" style="top: 22.3%; left: 90.3%; width: 3.0%; height: 5.5%;"></div>
        <div class="cat-target" id="cat-18" style="top: 8.8%; left:90.0%; width: 3.0%; height: 5.5%;"></div>
        <div class="cat-target" id="cat-19" style="top: 56.8%; left: 42.0%; width: 3.0%; height: 5.5%;"></div>
        <div class="cat-target" id="cat-20" style="top: 44.7%; left: 58.5%; width: 3.0%; height: 5.5%;"></div>

        <div id="hint-element" class="hint-ring"></div>
    </div>

    <div id="ui-panel">
        <button id="hint-btn" onclick="triggerHint()">💡 Get Hint</button>
        <div>Help's Found: <span id="counter">0</span> / 20</div>
    </div>

    <script>
        // Total configuration array up to 20 cat objects
        const gameState = {};
        for (let i = 1; i <= 20; i++) {
            gameState[`cat-${i}`] = false;
        }
        let foundCount = 0;

        document.querySelectorAll('.cat-target').forEach(target => {
            target.addEventListener('click', function() {
                if (this.classList.contains('found')) return;

                this.classList.add('found');
                gameState[this.id] = true;
                foundCount++;
                
                document.getElementById('counter').innerText = foundCount;

                if (foundCount === 20) {
                    setTimeout(() => { alert("🎉 Incredible! You found all 20 hidden Help's! Now go in the ducky chat and tell Ducky she lost her to Ren."); }, 300);
                }
            });
        });

        function triggerHint() {
            const unfound = Object.keys(gameState).filter(id => !gameState[id]);
            
            if (unfound.length === 0) {
                alert("NOICE! You've already found them all!");
                return;
            }

            // Picks one random remaining un-clicked cat to pulse
            const targetId = unfound[Math.floor(Math.random() * unfound.length)];
            const targetEl = document.getElementById(targetId);
            const hintRing = document.getElementById('hint-element');

            // Find center offsets dynamically
            const topPercent = parseFloat(targetEl.style.top) + (parseFloat(targetEl.style.height) / 2);
            const leftPercent = parseFloat(targetEl.style.left) + (parseFloat(targetEl.style.width) / 2);

            // Shift radar tracking element to target coordinates
            hintRing.style.top = `${topPercent}%`;
            hintRing.style.left = `${leftPercent}%`;
            
            hintRing.classList.remove('pulse-active');
            void hintRing.offsetWidth; // Force redraw execution step
            hintRing.classList.add('pulse-active');
        }
    </script>






</body>
</html>
